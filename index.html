<!DOCTYPE html>
<html>
<head>
    <title>Free Follow Page</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }
        .box {
            margin-top: 50px;
        }
        input, select, button {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
        }
        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        #loading, #formPage, #adminPage, #memberPage {
            display: none;
        }
    </style>
</head>

<body>

<h1>🔥 Free Follow for Instagram 🔥</h1>

<div id="loginPage" class="box">
    <select id="role">
        <option value="user">User</option>
        <option value="member">Member</option>
        <option value="admin">Admin</option>
    </select><br>

    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="text" id="id" placeholder="Enter ID"><br>

    <button onclick="login()">Login</button>
</div>

<div id="loading">
    <h2>Connecting to server... ⏳</h2>
</div>

<div id="formPage">
    <h2>Fill Details</h2>
    <input type="number" placeholder="Followers"><br>
    <label>Select followers (max 10):</label><br>
    <input type="range" min="1" max="10" value="5"><br>

    <button onclick="submitForm()">Submit</button>
</div>

<div id="memberPage">
    <h2>✨ Member Panel ✨</h2>
    <p>You have special powers 🚀</p>
</div>

<div id="adminPage">
    <h2>👑 Admin Panel</h2>
    <button onclick="togglePage()">Turn ON/OFF Website</button>
    <p id="status">Status: ON</p>
</div>

<div id="footer">
    <h3>This is best page. Thanks for using ❤️</h3>
</div>

<script>
let siteOn = true;

function login() {
    let role = document.getElementById("role").value;
    let name = document.getElementById("name").value;
    let id = document.getElementById("id").value;

    if (!siteOn && role !== "admin") {
        alert("Site is OFF by Admin");
        return;
    }

    if (role === "admin") {
        if (name !== "Akshay" || id !== "hellogoogle") {
            alert("Wrong Admin Credentials ❌");
            return;
        }
    }

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("loading").style.display = "block";

    setTimeout(() => {
        document.getElementById("loading").style.display = "none";

        if (role === "admin") {
            document.getElementById("adminPage").style.display = "block";
        } else if (role === "member") {
            document.getElementById("memberPage").style.display = "block";
            document.getElementById("formPage").style.display = "block";
        } else {
            document.getElementById("formPage").style.display = "block";
        }

    }, 10000);
}

function submitForm() {
    document.getElementById("formPage").innerHTML = "<h2>Submitting form... ⏳</h2>";

    setTimeout(() => {
        document.getElementById("formPage").innerHTML = "<h2>✅ Submitted Successfully!</h2>";
    }, 5000);
}

function togglePage() {
    siteOn = !siteOn;
    document.getElementById("status").innerText = "Status: " + (siteOn ? "ON" : "OFF");
}
</script>

</body>
</html>
